# Azure-specific Spring Boot Application Properties

# Spring DataSource Configuration
spring.datasource.url=jdbc:postgresql://db-bibflip-server.postgres.database.azure.com:5432/bibflip_azure_db?useSSL=true&serverTimezone=UTC
spring.datasource.username=useradmin
spring.datasource.password=Bibflip123
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring Data JPA Configuration
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=pe.upc.edu.bibflipbackend.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

